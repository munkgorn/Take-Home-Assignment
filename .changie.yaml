changesDir: .changes
unreleasedDir: unreleased
headerPath: header.tpl.md
changelogPath: CHANGELOG.md
versionExt: md
versionFormat: '## {{.Version}} - {{.Time.Format "2006-01-02"}}'
kindFormat: '### {{.Kind}}'
changeFormat: '* {{.Body}}'
kinds:
  - label: Added
    auto: minor
  - label: Changed
    auto: major
  - label: Fixed
    auto: patch
  - label: Removed
    auto: major
  - label: Security
    auto: patch
projects:
  - label: Backend
    key: backend
    changelog: backend/CHANGELOG.md
  - label: Frontend
    key: frontend
    changelog: frontend/CHANGELOG.md
newlines:
  afterChangelogHeader: 1
  beforeChangelogVersion: 1
  endOfVersion: 1
